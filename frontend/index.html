<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Estética Automotiva</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="layout">

        <aside class="sidebar">

            <h2>🚗 Estética</h2>

            <button onclick="mostrarDashboard()">
                Dashboard
            </button>

            <button onclick="mostrarServicos()">
                Serviços
            </button>

            <button onclick="mostrarClientes()">
                Clientes
            </button>

        </aside>

        <main class="conteudo">

            <section id="dashboard">

                <h1>Dashboard</h1>

                <div class="cards">

                    <div class="card">
                        <h3>Total Serviços</h3>

                        <p id="total-servicos">0</p>
                    </div>

                    <div class="card">
                        <h3>Total Clientes</h3>

                        <p id="total-clientes">0</p>
                    </div>

                </div>

            </section>

            <section id="servicos" style="display:none;">

                <h1>Serviços</h1>

                <div class="formulario">

                    <input type="text" id="nome" placeholder="Nome">

                    <input type="text" id="descricao" placeholder="Descrição">

                    <input type="number" id="preco" placeholder="Preço">

                    <input type="number" id="duracao" placeholder="Duração">

                    <button id="botao-form">
                        Cadastrar Serviço
                    </button>

                </div>

                <div id="lista-servicos"></div>

            </section>

            <section id="clientes" style="display:none;">

                <h1>Clientes</h1>

                <div id="lista-clientes"></div>

            </section>

        </main>

    </div>

    <script src="app.js"></script>

</body>
</html>
